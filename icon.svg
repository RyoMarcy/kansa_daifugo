<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1a6b3c" rx="32"/>
  <!-- 左のカード -->
  <rect x="18" y="28" width="76" height="108" fill="white" rx="10"/>
